name: Auto-Label Pull Requests

on:
  pull_request:
    types: [opened, synchronize, reopened]


permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Apply Labels
    uses: elegant-software/elegant-ci-cd-pipeline/.github/workflows/pull-request-auto-label.yml@ca1f2551831f54ad68d245b2db68bbef9debba23
    with:
      pr_number: ${{ github.event.pull_request.number }}
      repository: ${{ github.repository }}
      labels_config_path: .github/labels.yml
